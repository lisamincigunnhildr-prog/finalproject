<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>

  

    <!-- FontAwesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"

     <link

        href="{{url_for('static',filename='verify.css')}}"
    >

>

    </style>
</head>




    
</head>

<body id="anibg">

<div class="verify-container">

    <i class="fa-solid fa-envelope-circle-check fa-3x"></i>

    <h1>Email Verification</h1>

    <p>
        Enter the 6-digit verification code sent to your Gmail
    </p>
<form method="POST">

    
    <input type="hidden" name="otp" id="otp-final">

   
    <div class="otp-boxes">

        <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric">
        <input type="text" maxlength="1" class="otp-input" inputmode="numeric">

    </div>

    <button type="submit" class="verify-btn">
        Verify Code
    </button>

</form>
    <div class="timer">
        Expires in: <span id="countdown">05:00</span>
    </div>

    <div class="resend">
        Resend Code
    </div>

</div>
<script>

    // OTP INPUTS
    const inputs = document.querySelectorAll(".otp-input");
    const hiddenOtp = document.getElementById("otp-final");

    // AUTO NEXT INPUT
    inputs.forEach((input, index) => {

        input.addEventListener("input", () => {

            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }

        });

    });

    // COMBINE OTP BEFORE SUBMIT
    document.querySelector("form").addEventListener("submit", function () {

        let otp = "";

        inputs.forEach(input => {
            otp += input.value;
        });

        hiddenOtp.value = otp;

    });

    // ---------------- COUNTDOWN TIMER ----------------

    let timeLeft = 300;

    const countdown = document.getElementById("countdown");

    function updateTimer() {

        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        countdown.innerHTML = `${minutes}:${seconds}`;

        if (timeLeft <= 0) {

            clearInterval(timer);

            countdown.innerHTML = "Expired";

        }

        timeLeft--;

    }

    updateTimer();

    
    const timer = setInterval(updateTimer, 1000);

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

</body>
</html>
