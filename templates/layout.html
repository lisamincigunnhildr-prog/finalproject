<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>




    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">EventNova</div>

        <a href="{{ url_for('dashboard') }}">
            <i class="fa-solid fa-house"></i> Dashboard
        </a>

        <a href="{{ url_for('browse_events') }}">
            <i class="fa-solid fa-magnifying-glass"></i> Browse Events
        </a>

        <a href="{{ url_for('create_events') }}">
            <i class="fa-solid fa-circle-plus"></i> Create Event
        </a>

        <a href="{{ url_for('my_events') }}">
            <i class="fa-solid fa-users"></i> Joined Events
        </a>

    
   

        <a href="{{ url_for('profile') }}">
            <i class="fa-solid fa-user"></i> Profile
        </a>

    
        </a>
         <a href="{{ url_for('logout') }}">
           <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
     <script src="{{ url_for('static', filename='profile.js') }}"></script>
</body>
</html>
