{% extends 'adminlayout.html' %}

{% block content %}

<style>
.event-card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,.1);
    max-width: 900px;
    margin: auto;
}

.event-card h2 {
    color: #dc3545;
    margin-bottom: 20px;
}

.form-control, .form-select {
    border-radius: 10px;
}

h6{
    color:red;
}
</style>

<div class="container mt-4">

<div class="event-card">

<h2>Edit Event</h2>

<form method="POST" action="/manage-events/{{ event[0] }}/update">

    <!-- TITLE -->
    <div class="mb-3">
        <h6>Event Title</h6>
        <input type="text" name="title" class="form-control" value="{{ event[1] }}" required>
    </div>

    <!-- DESCRIPTION -->
    <div class="mb-3">
        <h6>Description</h6>
        <textarea name="description" class="form-control" rows="5">{{ event[2] }}</textarea>
    </div>

    <div class="row">

        <!-- CATEGORY -->
        <div class="col-md-6 mb-3">
            <h6>Category</h6>
            <input type="text" name="category" class="form-control" value="{{ event[3] }}">
        </div>

        <!-- EVENT TYPE -->
        <div class="col-md-6 mb-3">
            <h6>Event Type</h6>
            <select name="event_type" class="form-select">
                <option {% if event[4]=='Face-to-Face' %}selected{% endif %}>Face-to-Face</option>
                <option {% if event[4]=='Online' %}selected{% endif %}>Online</option>
                <option {% if event[4]=='Hybrid' %}selected{% endif %}>Hybrid</option>
            </select>
        </div>

    </div>

    <div class="row">

        <!-- REGION -->
        <div class="col-md-6 mb-3">
            <h6>Region</h6>
            <input type="text" name="region" class="form-control" value="{{ event[5] }}">
        </div>

        <!-- PROVINCE -->
        <div class="col-md-6 mb-3">
            <h6>Province</h6>
            <input type="text" name="province" class="form-control" value="{{ event[6] }}">
        </div>

    </div>

    <!-- STREET -->
    <div class="mb-3">
        <h6>Street</h6>
        <input type="text" name="street" class="form-control" value="{{ event[7] }}">
    </div>

    <div class="row">

        <!-- START -->
        <div class="col-md-6 mb-3">
            <h6>Start</h6>
            <input type="text" name="event_start" class="form-control" value="{{ event[8] }}">
        </div>

        <!-- END -->
        <div class="col-md-6 mb-3">
            <h6>End</h6>
            <input type="text" name="event_end" class="form-control" value="{{ event[9] }}">
        </div>

    </div>

    <!-- MAX PARTICIPANTS -->
    <div class="mb-3">
        <h6>Max Participants</h6>
        <input type="number" name="max_participants" class="form-control" value="{{ event[10] }}">
    </div>

    <!-- STATUS -->
    <div class="mb-3">
        <h6>Status</h6>
        <select name="status" class="form-select">
            <option value="live" {% if event[11]=='live' %}selected{% endif %}>Live</option>
            <option value="draft" {% if event[11]=='draft' %}selected{% endif %}>Draft</option>
        </select>
    </div>

    <!-- BUTTON -->
    <button type="submit" class="btn btn-danger w-100">
        Update Event
    </button>

</form>

</div>

</div>

{% endblock %}
